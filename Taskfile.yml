# Hamster builds with CGO_ENABLED=0, always (CLAUDE.md, ADR-0002). The one
# exception is the race detector, whose runtime needs cgo — race builds are
# test-only and never shipped.
version: '3'

env:
  CGO_ENABLED: '0'

tasks:
  build:
    desc: Compile all packages
    cmds:
      - go build ./...

  test:
    desc: Run all tests, including the simulation harness
    cmds:
      - go test ./...

  test-race:
    desc: Run tests under the race detector — the logic and data-plane packages, where real races live
    env:
      CGO_ENABLED: '1'
    # Excludes internal/cluster: that suite is real processes over real loopback
    # mTLS, the design's best-effort plumbing layer (SIMULATION.md). Per package
    # the detector finds no races there; run as one set under the detector's ~10x
    # slowdown it manufactures timing flakes (join-token TTLs lapsing, leadership
    # races) that are load artifacts, not data races — noise, not coverage. The
    # packages kept here cover where a real race would actually be: the simulated
    # core, the data plane, and the sys adapters. Race-check the cluster suite with
    # test-race-cluster when touching internal/cluster.
    cmds:
      - go test -race $(go list ./... | grep -v '/internal/cluster$')

  test-race-cluster:
    desc: Race-check the real-process cluster suite in isolation (best-effort; loopback-mTLS timing under the detector can flake without a data race)
    env:
      CGO_ENABLED: '1'
    cmds:
      - go test -race -count=1 ./internal/cluster/

  e2e:
    desc: Run the end-to-end suite against the real binary (real processes, loopback mTLS)
    cmds:
      - go vet -tags e2e ./test/e2e
      - go test -tags e2e -count=1 -v -timeout 600s ./test/e2e

  compat:
    desc: Run the third-party client compatibility suite (aws CLI, rclone, restic, s3cmd; absent tools skip)
    cmds:
      - go vet -tags compat ./test/compat
      - go test -tags compat -count=1 -v ./test/compat

  check:
    desc: go vet and gofmt
    cmds:
      - go vet ./...
      - |
        unformatted=$(gofmt -l .)
        if [ -n "$unformatted" ]; then
          echo "gofmt needed on:"
          echo "$unformatted"
          exit 1
        fi

  # Local multi-terminal cluster demo. One terminal per node, all sharing
  # DEMO_DIR (default /tmp/hamster-demo) and the same demo credentials. Ports
  # are derived from the node number: node N listens on 127.0.0.1:794(N-1)6-ish
  # (n1=7946, n2=7956, …) and serves S3 on 127.0.0.1:900(N-1) (n1=9000, …).
  cluster-demo-n1:
    desc: "Cluster demo, terminal 1: found n1 and serve S3 on :9000 (Ctrl-C to stop)"
    vars:
      DEMO_DIR: '{{.DEMO_DIR | default "/tmp/hamster-demo"}}'
    env:
      HAMSTER_ACCESS_KEY_ID: '{{.AKID | default "hamster"}}'
      HAMSTER_SECRET_ACCESS_KEY: '{{.SECRET | default "hamster-demo-secret"}}'
    cmds:
      - mkdir -p {{.DEMO_DIR}}
      - go build -o {{.DEMO_DIR}}/hamster ./cmd/hamster
      - |
        BIN={{.DEMO_DIR}}/hamster
        if [ ! -f {{.DEMO_DIR}}/n1/cluster/node.conf ]; then
          "$BIN" init -data-dir {{.DEMO_DIR}}/n1 -node n1 -listen 127.0.0.1:7946
        fi
        echo "n1 S3 endpoint: http://127.0.0.1:9000  (key: ${HAMSTER_ACCESS_KEY_ID})"
        exec "$BIN" serve -data-dir {{.DEMO_DIR}}/n1 -s3 127.0.0.1:9000

  cluster-demo-join:
    desc: "Cluster demo, terminal N: join node N (pass N=2, 3, …) and serve S3 — needs n1 running"
    vars:
      DEMO_DIR: '{{.DEMO_DIR | default "/tmp/hamster-demo"}}'
      N: '{{.N | default "2"}}'
    env:
      HAMSTER_ACCESS_KEY_ID: '{{.AKID | default "hamster"}}'
      HAMSTER_SECRET_ACCESS_KEY: '{{.SECRET | default "hamster-demo-secret"}}'
    cmds:
      - mkdir -p {{.DEMO_DIR}}
      - go build -o {{.DEMO_DIR}}/hamster ./cmd/hamster
      - |
        BIN={{.DEMO_DIR}}/hamster
        N={{.N}}
        listen=127.0.0.1:$((7946 + (N - 1) * 10))
        s3=127.0.0.1:$((9000 + N - 1))
        dir={{.DEMO_DIR}}/n$N
        echo "n$N S3 endpoint: http://$s3  (cluster $listen)"
        if [ ! -f "$dir/cluster/node.conf" ]; then
          token=$("$BIN" token -data-dir {{.DEMO_DIR}}/n1)
          exec "$BIN" serve -data-dir "$dir" -node "n$N" -listen "$listen" -s3 "$s3" -token "$token"
        else
          exec "$BIN" serve -data-dir "$dir" -s3 "$s3"
        fi

  cluster-demo-status:
    desc: "Cluster demo: show membership and topology (reads n1's data dir)"
    vars:
      DEMO_DIR: '{{.DEMO_DIR | default "/tmp/hamster-demo"}}'
    cmds:
      - mkdir -p {{.DEMO_DIR}}
      - go build -o {{.DEMO_DIR}}/hamster ./cmd/hamster
      - '{{.DEMO_DIR}}/hamster status -data-dir {{.DEMO_DIR}}/n1'

  cluster-demo-clean:
    desc: "Cluster demo: remove all demo data (stop the node terminals first)"
    vars:
      DEMO_DIR: '{{.DEMO_DIR | default "/tmp/hamster-demo"}}'
    cmds:
      - rm -rf {{.DEMO_DIR}}

  dist:
    desc: Cross-compile the static, version-stamped release binaries and SHA256SUMS into dist/ (pass VERSION=vX.Y.Z)
    requires:
      vars: [VERSION]
    cmds:
      - |
        set -e
        rm -rf dist && mkdir -p dist
        for platform in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64; do
          os=${platform%/*}; arch=${platform#*/}
          out="dist/hamster-{{.VERSION}}-${os}-${arch}"
          GOOS="$os" GOARCH="$arch" go build -trimpath \
            -ldflags "-s -w -X main.version={{.VERSION}}" -o "$out" ./cmd/hamster
          echo "built $out"
        done
        cd dist && shasum -a 256 hamster-* > SHA256SUMS
        echo "--- SHA256SUMS ---"
        cat SHA256SUMS

  release:
    desc: Cut a release — preflight, then tag and push; CI gates, cross-compiles, and publishes (VERSION=vX.Y.Z [TITLE="vX.Y.Z — …"])
    requires:
      vars: [VERSION]
    cmds:
      # The heavy gate, the cross-compile, and the GitHub publish now live in CI
      # (.github/workflows/release.yml fires on the pushed v* tag). This target is
      # the safe local trigger: it preflights and pushes the tag, and the workflow
      # does the rest. The binaries are built from the tag (the only version source),
      # so nothing here is hand-stamped.
      - |
        set -e
        # Preflight: a clean tree on main, the tag still free, and — per the
        # CLAUDE.md release policy — the README version row already flipped to ✅ and
        # linked to this tag (the workflow re-checks this, but fail fast locally).
        if [ -n "$(git status --porcelain)" ]; then
          echo "release: working tree is not clean — commit or stash first" >&2; exit 1
        fi
        branch=$(git rev-parse --abbrev-ref HEAD)
        if [ "$branch" != "main" ]; then
          echo "release: on '$branch', not main" >&2; exit 1
        fi
        if git rev-parse -q --verify "refs/tags/{{.VERSION}}" >/dev/null; then
          echo "release: tag {{.VERSION}} already exists" >&2; exit 1
        fi
        url="https://github.com/hamster-storage/hamster/releases/tag/{{.VERSION}}"
        if ! grep -qF "$url" README.md; then
          echo "release: README has no row linking to $url — flip the version-status table to ✅ and link it first (CLAUDE.md release policy)" >&2; exit 1
        fi
        title="{{.TITLE}}"; [ -n "$title" ] || title="{{.VERSION}}"
        git tag -a "{{.VERSION}}" -m "$title"
        git push origin "{{.VERSION}}"
        echo "Pushed tag {{.VERSION}} — the Release workflow will gate, cross-compile, and publish the GitHub release."
